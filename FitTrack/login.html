<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="logo">FitTrack</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="container">
        <div id="loginSection">
            <h2>Login</h2>
            <form id="loginForm">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username" required>
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <p style="margin-top:15px;">
                Don't have an account?
                <a href="#" onclick="showRegister()">Register here</a>
            </p>
            <p id="loginError" style="display:none; color:red; margin-top:10px;">
                Wrong username or password!
            </p>
        </div>

        <div id="registerSection" style="display:none;">
            <h2>Register</h2>
            <form id="registerForm">
                <label>Username</label>
                <input type="text" id="regUsername" placeholder="Choose a username" required>
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Choose a password" required>
                <button type="submit" class="btn">Register</button>
            </form>
            <p style="margin-top:15px;">
                Already have an account?
                <a href="#" onclick="showLogin()">Login here</a>
            </p>
            <p id="registerError" style="display:none; color:red; margin-top:10px;">
                Username already exists!
            </p>
            <p id="registerSuccess" style="display:none; color:green; margin-top:10px;">
                Account created! You can now login.
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
