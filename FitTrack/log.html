<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack - Log Workout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="logo">FitTrack</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="log.html">Log Workout</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="exercises.html">Exercises</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Log a Workout</h2>
        <form id="workoutForm">
            <label>Exercise Name</label>
            <input type="text" id="exerciseName" placeholder="e.g. Push Up" required>

            <label>Sets</label>
            <input type="number" id="sets" placeholder="e.g. 3" required>

            <label>Reps</label>
            <input type="number" id="reps" placeholder="e.g. 15" required>

            <label>Duration (minutes)</label>
            <input type="number" id="duration" placeholder="e.g. 30" required>

            <label>Date</label>
            <input type="date" id="date" required>

            <button type="submit" class="btn">Save Workout</button>
        </form>
        <p id="successMsg" style="display:none; color:green; margin-top:15px;">
            Workout saved successfully!
        </p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
